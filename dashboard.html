{% extends 'base.html' %}

{% block content %}
<div class="font-sans bg-slate-50 max-w-4xl mx-auto py-12 px-6 min-h-screen rounded-3xl mt-8">
    <h1 class="text-2xl font-semibold text-gray-900 mb-8">Mening Kurslarim (Progress)</h1>
    
    <div class="space-y-6">
        {% for enrollment in enrollments %}
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-gray-900 font-medium">{{ enrollment.course.title }}</h3>
                <span class="text-sm text-indigo-600 font-semibold">{{ enrollment.progress_percent }}%</span>
            </div>
            <!-- Progress Bar -->
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div class="bg-indigo-600 h-2 rounded-full transition-all duration-500 relative" style="width: {{ enrollment.progress_percent|default:0 }}%;"></div>
            </div>
        </div>
        {% empty %}
        <p class="text-gray-500">Siz hali hech qanday kursga yozilmagansiz.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
