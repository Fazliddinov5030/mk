server {
    listen 80;
    server_name sizning-domeningiz.uz www.sizning-domeningiz.uz;

    # Xatolik loglari
    access_log /var/log/nginx/book_access.log;
    error_log /var/log/nginx/book_error.log;

    location = /favicon.ico { access_log off; log_not_found off; }
    
    # Statik fayllar (Django collectstatic orqali yig'ilgan)
    location /static/ {
        alias /var/www/book/staticfiles/;
    }

    # Foydalanuvchi yuklagan fayllar
    location /media/ {
        alias /var/www/book/media/;
    }

    # Qolgan barcha so'rovlarni Docker'dagi Django Gunicorn'ga yuborish
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}