<!DOCTYPE html>
<html lang="uz">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimHub</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'] 
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-white text-[#111827] font-sans min-h-screen flex flex-col">
    
    <!-- Navbar barcha sahifalar uchun -->
    {% include 'components/navbar.html' %}

    <!-- Global messages (Toast notification style) -->
    {% if messages %}
    <div class="fixed top-20 right-4 z-50 flex flex-col gap-3 max-w-sm w-full">
        {% for message in messages %}
            <div class="bg-white border border-[#E5E7EB] rounded-xl shadow-sm px-4 py-3 text-sm flex items-start gap-3 
                {% if message.tags == 'success' %}border-l-4 border-l-[#10B981]{% elif message.tags == 'error' %}border-l-4 border-l-[#EF4444]{% else %}border-l-4 border-l-[#6366F1]{% endif %}">
                <span class="text-[#374151] font-medium leading-relaxed">{{ message }}</span>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-grow flex flex-col">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}
    <script src="{% static 'js/auth.js' %}"></script>
    {% endblock %}

</body>
</html>
