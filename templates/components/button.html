{% comment %}Reusable button component.
Parameters:
 - is_link (bool): when true renders an <a>, otherwise a <button>.
 - href: URL for link buttons
 - label: button text
 - button_type: for <button> (submit, button)
 - classes: additional CSS classes
 - icon: optional SVG string (rendered before label)
 - icon_position: 'left' or 'right'
{% endcomment %}
{% if is_link %}
<a href="{{ href }}" class="{{ classes|default:'btn btn--primary' }}">
    {% if icon and icon_position != 'right' %}<span class="btn__icon">{{ icon|safe }}</span>{% endif %}
    <span class="btn__label">{{ label }}</span>
    {% if icon and icon_position == 'right' %}<span class="btn__icon">{{ icon|safe }}</span>{% endif %}
</a>
{% else %}
<button type="{{ button_type|default:'button' }}" class="{{ classes|default:'btn btn--primary' }}">
    {% if icon and icon_position != 'right' %}<span class="btn__icon">{{ icon|safe }}</span>{% endif %}
    <span class="btn__label">{{ label }}</span>
    {% if icon and icon_position == 'right' %}<span class="btn__icon">{{ icon|safe }}</span>{% endif %}
</button>
{% endif %}
