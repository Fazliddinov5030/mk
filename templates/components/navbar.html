<nav class="bg-white border-b border-[#E9E9E7] sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
        <a href="/" class="text-base font-semibold text-[#37352F]">BilimHub</a>

        <div class="hidden md:flex items-center gap-6">
            <a href="{% url 'course_list' %}" class="text-sm text-[#787774] hover:text-[#37352F] transition-colors">Kurslar</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="text-sm text-[#787774] hover:text-[#37352F] transition-colors">Dashboard</a>
                <div class="user-menu" style="position:relative;">
                    <button class="flex items-center gap-2 text-sm text-[#787774] hover:text-[#37352F] transition-colors bg-transparent border-0 cursor-pointer">
                        <div class="w-7 h-7 rounded-full bg-[#E9E9E7] flex items-center justify-center text-[#37352F] font-medium text-xs">
                            {% with initial=user.first_name|default:user.username %}{{ initial|slice:":1"|upper }}{% endwith %}
                        </div>
                        <span class="font-medium">{{ user.get_full_name|default:user.username }}</span>
                    </button>
                    <div class="menu" style="display:none; position:absolute; right:0; top: calc(100% + 8px); background:#fff; border:1px solid #eef0ee; box-shadow:0 8px 24px rgba(16,24,40,0.06); border-radius:8px; min-width:160px; z-index:60;">
                        <a href="{% url 'profile' %}" class="block px-4 py-2 text-sm text-[#37352F] hover:bg-[#F7F7F5]">Profil</a>
                        <a href="{% url 'dashboard' %}" class="block px-4 py-2 text-sm text-[#37352F] hover:bg-[#F7F7F5]">Dashboard</a>
                        <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-[#37352F] hover:bg-[#F7F7F5]">Chiqish</a>
                    </div>
                </div>
            {% endif %}
        </div>

        <div class="flex items-center gap-3">
            {% if not user.is_authenticated %}
                <a href="{% url 'login' %}" class="text-sm font-medium text-[#37352F] hover:bg-[#F1F1EF] rounded-md px-3 py-1.5 transition-colors">Kirish</a>
                <a href="{% url 'register' %}" class="bg-[#2F3437] text-white text-sm font-medium rounded-md px-4 py-1.5 hover:bg-black transition-colors">Ro'yxatdan o'tish</a>
            {% endif %}
        </div>
    </div>
</nav>
